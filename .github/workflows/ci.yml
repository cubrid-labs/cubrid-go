name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: Go vet
        run: go vet ./...
      - name: Go fmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files need formatting:"
            gofmt -l .
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.21", "1.22"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Download dependencies
        run: go mod download
      - name: Run tests
        run: go test -v -short -coverprofile=coverage.out ./...
      - name: Show coverage
        run: go tool cover -func=coverage.out

  integration:
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        cubrid-version: ["11.2", "11.0"]
    services:
      cubrid:
        image: cubrid/cubrid:${{ matrix.cubrid-version }}
        env:
          CUBRID_DB: testdb
        ports:
          - 33000:33000
        options: >-
          --health-cmd "csql -u dba testdb -c 'SELECT 1'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: Download dependencies
        run: go mod download
      - name: Run integration tests
        env:
          CUBRID_TEST_DSN: "CUBRID:localhost:33000:testdb:::"
        run: go test -v -run Integration ./...
